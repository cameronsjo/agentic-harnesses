<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Artificer theme bootstrap — FIRST in <head>, before any CSS.
         Sets data-theme before first paint so the dark-first page never
         flashes light on load (Artificer v0.9.0 baseline contract). The
         'artificer.theme' key MUST match artificer-theme.js and App.tsx. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('artificer.theme');
          // Dark-first: match artificer-theme.js + App.readTheme, which default to
          // dark unless the OS explicitly prefers light. (Keying off prefers-dark
          // here flashed light on no-preference systems before the runtime corrected it.)
          var prefersLight = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          document.documentElement.setAttribute(
            'data-theme', saved || (prefersLight ? 'light' : 'dark'));
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
